<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djembay - African Music Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0F19;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 300vw;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0;
            position: relative;
        }

        .page-1 {
            background: #7C3AED;
        }

        .page-2 {
            background: #1B1F3B;
        }

        .page-3 {
            background: #000000;
        }

        .page-content {
            width: 55%;
            padding: 4rem 6rem;
            color: #F8FAFC;
        }

        .page-icon {
            margin-bottom: 2rem;
            color: #F8FAFC;
        }

        .page-1 .page-icon {
            color: #F5B301;
        }

        .page-2 .page-icon {
            color: #7C3AED;
        }

        .page-3 .page-icon {
            color: #F5B301;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 3.8rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .page-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 1.4rem;
            opacity: 0.9;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .page-label {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
            margin-top: 2rem;
        }

        .image-side {
            width: 45%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 60%;
            height: 100%;
            pointer-events: none;
        }

        .page-1 .image-shadow {
            background: linear-gradient(to right, #7C3AED 0%, rgba(124, 58, 237, 0.8) 20%, rgba(124, 58, 237, 0) 100%);
        }

        .page-2 .image-shadow {
            background: linear-gradient(to right, #1B1F3B 0%, rgba(27, 31, 59, 0.8) 20%, rgba(27, 31, 59, 0) 100%);
        }

        .page-3 .image-shadow {
            background: linear-gradient(to right, #000000 0%, rgba(0, 0, 0, 0.8) 20%, rgba(0, 0, 0, 0) 100%);
        }

        .navigation {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 2rem;
            z-index: 100;
            pointer-events: none;
        }

        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(248, 250, 252, 0.3);
            background: rgba(18, 24, 38, 0.85);
            backdrop-filter: blur(10px);
            color: #F8FAFC;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .nav-btn:hover {
            background: #7C3AED;
            border-color: #7C3AED;
            transform: scale(1.1);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-indicators {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.8rem;
            z-index: 100;
        }

        .indicator {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: rgba(248, 250, 252, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .indicator.active {
            background: #7C3AED;
            width: 48px;
            box-shadow: 0 0 14px rgba(124, 58, 237, 0.6);
        }

        @media (max-width: 768px) {
            .page {
                flex-direction: column;
            }

            .page-content {
                width: 100%;
                padding: 2rem;
                order: 1;
            }

            .image-side {
                width: 100%;
                height: 45%;
                order: 2;
            }

            .page-title {
                font-size: 2.2rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .navigation {
                padding: 0 1rem;
            }

            .nav-btn {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="pageContainer">
        <div class="page page-1">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="home" style="width: 56px; height: 56px;"></i>
                </div>
                <h1 class="page-title">Discover</h1>
                <p class="page-subtitle">Where African music lives</p>
                <p class="page-label">Home</p>
            </div>
            <div class="image-side">
                <div class="image-container">
                    <img src="Assets/Images/page1.png" alt="Discover African Music">
                    <div class="image-shadow"></div>
                </div>
            </div>
        </div>

        <div class="page page-2">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="search" style="width: 56px; height: 56px;"></i>
                </div>
                <h1 class="page-title">Explore</h1>
                <p class="page-subtitle">Find your rhythm, your sound</p>
                <p class="page-label">Search</p>
            </div>
            <div class="image-side">
                <div class="image-container">
                    <img src="Assets/Images/page2.png" alt="Explore Music">
                    <div class="image-shadow"></div>
                </div>
            </div>
        </div>

        <div class="page page-3">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="play-circle" style="width: 56px; height: 56px;"></i>
                </div>
                <h1 class="page-title">Feel It</h1>
                <p class="page-subtitle">Let the beat take control</p>
                <p class="page-label">Now Playing</p>
            </div>
            <div class="image-side">
                <div class="image-container">
                    <img src="Assets/Images/page3.png" alt="Music Player">
                    <div class="image-shadow"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <button class="nav-btn" id="prevBtn" aria-label="Previous page">
            <i data-lucide="chevron-left" style="width: 28px; height: 28px;"></i>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="Next page">
            <i data-lucide="chevron-right" style="width: 28px; height: 28px;"></i>
        </button>
    </div>

    <div class="nav-indicators">
        <div class="indicator active" data-index="0"></div>
        <div class="indicator" data-index="1"></div>
        <div class="indicator" data-index="2"></div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('pageContainer');
            const indicators = document.querySelectorAll('.indicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let currentPage = 0;
            const totalPages = 3;

            function updateUI(index) {
                container.style.transform = `translateX(-${index * 100}vw)`;

                indicators.forEach(ind => ind.classList.remove('active'));
                const activeIndicator = document.querySelector(`.indicator[data-index="${index}"]`);
                if (activeIndicator) activeIndicator.classList.add('active');

                prevBtn.style.opacity = index === 0 ? '0.3' : '1';
                prevBtn.style.pointerEvents = index === 0 ? 'none' : 'auto';
                nextBtn.style.opacity = index === totalPages - 1 ? '0.3' : '1';
                nextBtn.style.pointerEvents = index === totalPages - 1 ? 'none' : 'auto';
            }

            function navigateTo(index) {
                if (index >= 0 && index < totalPages && index !== currentPage) {
                    currentPage = index;
                    updateUI(currentPage);
                }
            }

            indicators.forEach(indicator => {
                indicator.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    navigateTo(index);
                });
            });

            prevBtn.addEventListener('click', function() {
                navigateTo(currentPage - 1);
            });

            nextBtn.addEventListener('click', function() {
                navigateTo(currentPage + 1);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    navigateTo(currentPage - 1);
                } else if (e.key === 'ArrowRight') {
                    navigateTo(currentPage + 1);
                }
            });

            lucide.createIcons();
            updateUI(0);
        })();
    </script>
</body>
</html>
