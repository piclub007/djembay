<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djembay - African Music Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0F19;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 500vw;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .page-home {
            background: linear-gradient(135deg, #1B1F3B 0%, #121826 100%);
        }

        .page-search {
            background: linear-gradient(135deg, #7C3AED 0%, #121826 100%);
        }

        .page-player {
            background: linear-gradient(135deg, #0B0F19 0%, #1B1F3B 50%, #7C3AED 100%);
        }

        .page-library {
            background: linear-gradient(135deg, #121826 0%, #1B1F3B 100%);
        }

        .page-artist {
            background: linear-gradient(135deg, #1B1F3B 0%, #F5B301 100%);
        }

        .page-content {
            text-align: center;
            color: #F8FAFC;
        }

        .page-icon {
            margin-bottom: 2rem;
            color: #F8FAFC;
        }

        .page-home .page-icon {
            color: #F5B301;
        }

        .page-search .page-icon {
            color: #F8FAFC;
        }

        .page-player .page-icon {
            color: #7C3AED;
        }

        .page-library .page-icon {
            color: #F5B301;
        }

        .page-artist .page-icon {
            color: #1B1F3B;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 1.3rem;
            opacity: 0.9;
            font-style: italic;
        }

        .page-label {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 1.5rem;
        }

        .navigation {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.8rem;
            z-index: 100;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(248, 250, 252, 0.2);
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(10px);
            color: #F8FAFC;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #7C3AED;
            border-color: #7C3AED;
            transform: scale(1.1);
        }

        .nav-btn.active {
            background: #7C3AED;
            border-color: #7C3AED;
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.6);
        }

        .nav-btn.prev,
        .nav-btn.next {
            width: 56px;
            height: 56px;
            border-color: rgba(248, 250, 252, 0.4);
        }

        .nav-btn.prev:hover,
        .nav-btn.next:hover {
            background: #1B1F3B;
            border-color: #7C3AED;
        }

        .nav-indicators {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            z-index: 100;
        }

        .indicator {
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: rgba(248, 250, 252, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .indicator.active {
            background: #7C3AED;
            width: 48px;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.5);
        }

        .indicator.gold {
            background: #F5B301;
            box-shadow: 0 0 12px rgba(245, 179, 1, 0.5);
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 2.2rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .nav-btn {
                width: 42px;
                height: 42px;
                font-size: 0.8rem;
            }

            .nav-btn.prev,
            .nav-btn.next {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="pageContainer">
        <div class="page page-home">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="home" style="width: 64px; height: 64px;"></i>
                </div>
                <h1 class="page-title">Discover</h1>
                <p class="page-subtitle">Where African music lives</p>
                <p class="page-label">Home</p>
            </div>
        </div>

        <div class="page page-search">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="search" style="width: 64px; height: 64px;"></i>
                </div>
                <h1 class="page-title">Explore</h1>
                <p class="page-subtitle">Find your rhythm, your sound</p>
                <p class="page-label">Search</p>
            </div>
        </div>

        <div class="page page-player">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="play-circle" style="width: 64px; height: 64px;"></i>
                </div>
                <h1 class="page-title">Feel It</h1>
                <p class="page-subtitle">Let the beat take control</p>
                <p class="page-label">Now Playing</p>
            </div>
        </div>

        <div class="page page-library">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="library" style="width: 64px; height: 64px;"></i>
                </div>
                <h1 class="page-title">Your Music</h1>
                <p class="page-subtitle">Songs you love, always here</p>
                <p class="page-label">Library</p>
            </div>
        </div>

        <div class="page page-artist">
            <div class="page-content">
                <div class="page-icon">
                    <i data-lucide="mic-2" style="width: 64px; height: 64px;"></i>
                </div>
                <h1 class="page-title">Artists</h1>
                <p class="page-subtitle">The voices of the continent</p>
                <p class="page-label">Artist Page</p>
            </div>
        </div>
    </div>

    <div class="nav-indicators">
        <div class="indicator gold active" data-index="0"></div>
        <div class="indicator" data-index="1"></div>
        <div class="indicator" data-index="2"></div>
        <div class="indicator gold" data-index="3"></div>
        <div class="indicator" data-index="4"></div>
    </div>

    <div class="navigation">
        <button class="nav-btn prev" id="prevBtn" aria-label="Previous page">
            <i data-lucide="chevron-left" style="width: 24px; height: 24px;"></i>
        </button>
        <button class="nav-btn active" data-index="0">
            <i data-lucide="home" style="width: 18px; height: 18px;"></i>
        </button>
        <button class="nav-btn" data-index="1">
            <i data-lucide="search" style="width: 18px; height: 18px;"></i>
        </button>
        <button class="nav-btn" data-index="2">
            <i data-lucide="play" style="width: 18px; height: 18px;"></i>
        </button>
        <button class="nav-btn" data-index="3">
            <i data-lucide="library" style="width: 18px; height: 18px;"></i>
        </button>
        <button class="nav-btn" data-index="4">
            <i data-lucide="mic-2" style="width: 18px; height: 18px;"></i>
        </button>
        <button class="nav-btn next" id="nextBtn" aria-label="Next page">
            <i data-lucide="chevron-right" style="width: 24px; height: 24px;"></i>
        </button>
    </div>

    <script>
        (function() {
            const container = document.getElementById('pageContainer');
            const navBtns = document.querySelectorAll('.nav-btn[data-index]');
            const indicators = document.querySelectorAll('.indicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let currentPage = 0;
            const totalPages = 5;

            function updateUI(index) {
                container.style.transform = `translateX(-${index * 100}vw)`;

                navBtns.forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.nav-btn[data-index="${index}"]`);
                if (activeBtn) activeBtn.classList.add('active');

                indicators.forEach(ind => ind.classList.remove('active'));
                const activeIndicator = document.querySelector(`.indicator[data-index="${index}"]`);
                if (activeIndicator) activeIndicator.classList.add('active');

                prevBtn.style.opacity = index === 0 ? '0.4' : '1';
                prevBtn.style.pointerEvents = index === 0 ? 'none' : 'auto';
                nextBtn.style.opacity = index === totalPages - 1 ? '0.4' : '1';
                nextBtn.style.pointerEvents = index === totalPages - 1 ? 'none' : 'auto';
            }

            function navigateTo(index) {
                if (index >= 0 && index < totalPages && index !== currentPage) {
                    currentPage = index;
                    updateUI(currentPage);
                }
            }

            navBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    navigateTo(index);
                });
            });

            indicators.forEach(indicator => {
                indicator.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    navigateTo(index);
                });
            });

            prevBtn.addEventListener('click', function() {
                navigateTo(currentPage - 1);
            });

            nextBtn.addEventListener('click', function() {
                navigateTo(currentPage + 1);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    navigateTo(currentPage - 1);
                } else if (e.key === 'ArrowRight') {
                    navigateTo(currentPage + 1);
                }
            });

            lucide.createIcons();
            updateUI(0);
        })();
    </script>
</body>
</html>
